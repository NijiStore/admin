<!DOCTYPE html>
<html>
<head>
  <title>Niji — Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-wrapper">
  <div class="admin-card">

    <div class="login-title">Admin Panel</div>
    <div class="login-sub">User Control</div>

    <div id="userList" class="user-list"></div>

    <div class="admin-create">
      <input id="newUser" class="login-input" placeholder="username">
      <input id="newPass" class="login-input" placeholder="password">
      <button class="logout-btn" onclick="createUser()">Create</button>
    </div>

  </div>
</div>

<!-- PERMISSION MODAL -->
<div id="permModal" class="popup-overlay">
  <div class="admin-card" style="width:300px;">

    <div class="login-title">Permissions</div>

    <!-- ADD PERMISSION -->
    <div class="admin-create">
      <input id="permInput" class="login-input" placeholder="permission (e.g. protojournal:read)">
      <button class="logout-btn" onclick="addPerm()">Add</button>
    </div>

    <!-- CURRENT PERMISSIONS -->
    <div id="permList" class="perm-list"></div>

    <button class="logout-btn" onclick="closePerms()">Close</button>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
